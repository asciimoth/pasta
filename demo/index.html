<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pasta web demo</title>
    <link rel="stylesheet" href="./vendor/litegraph/litegraph.css">
    <link rel="stylesheet" href="./style.css">
    <script src="./public/wasm_exec.js"></script>
    <script src="./vendor/litegraph/litegraph.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <h1>Pasta demo</h1>
          <span id="backend-status">Loading</span>
        </div>
        <nav class="tabs" aria-label="Demo tabs">
          <button class="active" data-tab="graph" type="button">Graph</button>
          <button data-tab="logs" type="button">Logs</button>
          <button data-tab="config" type="button">Config</button>
        </nav>
        <div class="actions">
          <button id="save-config" type="button">Save config</button>
          <button id="reload-config" type="button">Reload config</button>
          <button id="restart-frontend" type="button">Restart frontend</button>
        </div>
      </header>

      <section class="panel graph-panel" data-panel="graph">
        <canvas id="graph-canvas"></canvas>
        <aside id="sidekick" aria-label="Node side panel"></aside>
      </section>

      <section class="panel hidden logs-panel" data-panel="logs">
        <ol id="logs-list" aria-label="Merged logs"></ol>
      </section>

      <section class="panel hidden config-panel" data-panel="config">
        <textarea id="config-text" spellcheck="false" aria-label="Current HuJSON config"></textarea>
      </section>
    </main>
    <script type="module" src="./public/build/app.js"></script>
  </body>
</html>
